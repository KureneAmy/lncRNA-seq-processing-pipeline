# config.yaml
# Please use ABSOLUTE paths and avoid adding "/" at the end of file folder's path


# --- 1. Experimental Design ---
# ERCC spike-in controls (optional)
# If you have ERCC spike-ins, set to true and provide the path to other necessary files
# If not using ERCC, set to false and other fields will be ignored
ercc:
  use_ercc: true
  ercc_fasta: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/ercc/ERCC92.fa"
  ercc_gtf: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/ercc/ERCC92.gtf"
  ercc_conc: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/ercc/ERCC92_conc.txt"
  ercc_star_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/star_ercc_index"
  ercc_analysis_script: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Scripts/ercc_analysis.R"

ercc_params:
  # Specify the path to the ERCC spike-in database
  dilution: 100
  ercc_ul: 2
  rna_pg_per_cell: 30
  total_rna_ug: 1

# Scripts essential for whole pipeline (paths should be ABSOLUTE)
scripts:
  # R script for differential expression analysis and GO enrichment
  rna_analysis: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Scripts/rna_seq_analysis.R"
  # R script for lncRNA downstream analysis
  lncRNA_analysis: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Scripts/lncRNA_analysis.R"
  # If using ERCC, provide the R script for ERCC analysis in Expermental Design section


# --- 2. Run Parameters ---
# Path to the Singularity container (lncRNAseq.sif)
# Use ABSOLUTE path
container: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Containers/lncRNAseq.sif"

# Output directory for all results
# Use ABSOLUTE path
output_dir: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Output"

# --- 3. Samples ---
# Sample information with paths to FASTQ files
# For single-end data: omit "R2" field
# For paired-end data: include both "R1" and "R2" fields
# Use ABSOLUTE paths for all FASTQ files
# 
# The "condition" field should match your experimental groups
# and will be used in differential expression analysis
samples:
  SRR7685881_control_Rep2:
    R1: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Test_Files/SRR7685881.fastq.gz"
    prefix: "control_Rep2"
    condition: "Control"
  
  SRR7685880_control_Rep1:
    R1: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Test_Files/SRR7685880.fastq.gz"
    prefix: "control_Rep1"
    condition: "Control"
    
  SRR7685879_treated_Rep2:
    R1: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Test_Files/SRR7685879.fastq.gz"
    prefix: "treated_Rep2"
    condition: "Treated"

  SRR7685878_treated_Rep1:
    R1: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Test_Files/SRR7685878.fastq.gz"
    prefix: "treated_Rep1"
    condition: "Treated"
    
# Example for single-end data:
#  Sample_SE:
#    R1: "/path/to/data/Sample_SE_data.fastq.gz"
#    prefix: "expr1"
#    condition: "Control"/...
#
# Example for paired-end data:
#  Sample_PE:
#    R1: "/path/to/data/Sample_PE_data_R1.fastq.gz"
#    R2: "/path/to/data/Sample_PE_data_R2.fastq.gz"
#    prefix: "expr2"
#    condition: "Control"/... 


# --- 4. Reference Files ---
# All paths should be ABSOLUTE paths
# See README.md for instructions on preparing reference files
ref:
  # GTF annotation file
  gtf: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/gencode.vM38.primary_assembly.annotation.gtf"
  
  # Genome FASTA file
  fasta: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/GRCm39.primary_assembly.genome.fa"
  
  # STAR rRNA index
  # Used for removing ribosomal RNA reads
  rrna_bt2_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/bowtie2_rrna_index/rrna"
  
  # STAR genome index
  star_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/star_genome_index"
  
  # RSEM grp file (ABSOLUTE path) (optional)
  # The pipeline will infer RSEM reference name by removing the '.grp' suffix.
  # Example: '/path/to/rsem_ref.grp' -> ref name '/path/to/rsem_ref'
  rsem_grp: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/References/rsem_index/rsem_ref.grp"


# --- 5. Analysis Parameters ---
# Number of CPU threads to use for parallel processing
# Recommended: 8 cores
threads: 8

params:
  # Adapter sequence for Trim Galore.
  # Set to "" (empty string) to use auto-detection.
  trim_galore_adapter_sequence: ""
  # --- Align Mode Parameters ---
  # featureCounts strand specificity:
  #   0: unstranded
  #   1: stranded (first-strand)
  #   2: reversely stranded (second-strand, most common for Illumina dUTP methods)
  # Default: 2 (reversely stranded)
  featurecounts_strandedness: 2
  

# --- 6. Differential Expression Analysis Settings ---
analysis:

  # Whether to perform RSEM quantification
  # If true, RSEM will be used for quantification and tpm matrix will be generated. Please make sure the RSEM reference is properly prepared and the path is correctly specified in the Reference Files section.
  # If false, featureCounts will be used for quantification.
  use_rsem: false

  # Differential expression analysis settings
  # Contrast for differential expression analysis
  # Format: [treatment_group, control_group]
  # The first group will be compared against the second (control)
  # These names must match the "condition" values in the samples section
  contrast: ["Treated", "Control"]
  
  # FDR (False Discovery Rate) threshold for significance
  # Genes with adjusted p-value < fdr_threshold are considered significant
  fdr_threshold: 0.05
  
  # Log2 fold change threshold for filtering
  # Genes with |log2FoldChange| > lfc_threshold are considered differentially expressed
  lfc_threshold: 1
  
  # Annotation database for GO enrichment analysis
  # For human: "org.Hs.eg.db"
  # For mouse: "org.Mm.eg.db"
  # For other species, see Bioconductor annotation packages
  r_annotation_db: "org.Mm.eg.db"
  
  # Organism name for GO enrichment
  # For human: "hsa"
  # For mouse: "mmu"
  organism: "mmu"
  
  # Whether to perform DESeq2 analysis and the downstream lncRNA-seq analysis
  # If you don't have at least 2 replicated samples for each group, deseq2 should be set to false.
  # If replicated samples are available, you can set to true to perform DESeq2 and GSEA analyses, etc.
  deseq2: true


# --- 7. Report Settings ---
# Controls the automatic HTML + Markdown report generated at the end of the pipeline.
report:
  # Set to false to skip report generation entirely.
  enable: true
  # absolute path to the report generation script (generate_report.py)
  script: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/lncRNA/Scripts/generate_report.py"
  # Report metadata (displayed in the report header).
  title: "lncRNA-seq Analysis Report"
  author: "EasyOmics Pipeline"
  project: "lncRNA-seq Project"

  # When true, images are embedded as base64 data URIs so the HTML file
  # can be opened offline without any external dependencies.
  inline_images: true

